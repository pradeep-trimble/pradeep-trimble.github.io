<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity Mobile - Database Relationships</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      overflow: hidden;
      height: 100vh;
    }
  </style>
</head>
<body>
<div>

  <div id="toolbar">
    <h1>Unity Mobile <span>·</span> How tables relate</h1>
    <div class="sep"></div>
    <input id="search" placeholder="Search table…" autocomplete="off" />
    <div class="sep"></div>
    <button class="filter-btn active" data-area="all">All</button>
    <button class="filter-btn" data-area="auth" style="--c:#10b981">Auth &amp; Org</button>
    <button class="filter-btn" data-area="user" style="--c:#3b82f6">Users</button>
    <button class="filter-btn" data-area="workflow" style="--c:#f59e0b">Workflow</button>
    <button class="filter-btn" data-area="forms" style="--c:#06b6d4">Forms</button>
    <button class="filter-btn" data-area="map" style="--c:#84cc16">Maps</button>
    <button class="filter-btn" data-area="workitem" style="--c:#ef4444">Work Items</button>
    <button class="filter-btn" data-area="cityworks" style="--c:#f97316">Cityworks</button>
    <button class="filter-btn" data-area="positioning" style="--c:#6366f1">Positioning</button>
    <button class="filter-btn" data-area="telog" style="--c:#ec4899">Telog</button>
    <button id="btn-reset">⟳ Reset</button>
  </div>

  <div id="canvas-outer">
    <div id="canvas">
      <svg id="arrows-svg"></svg>
    </div>
  </div>

  <div id="info-panel">
    <button id="close-panel">✕</button>
    <h2 id="ip-name"></h2>
    <div class="ip-db" id="ip-db"></div>
    <div class="ip-desc" id="ip-desc"></div>
    <div class="ip-section">Columns</div>
    <div id="ip-cols"></div>
    <div class="ip-section">Relationships</div>
    <div id="ip-rels"></div>
  </div>

  <div id="tooltip"></div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // AREA CONFIG
    // ═══════════════════════════════════════════════════════════
    const AREAS = {
      auth: { label: 'Auth & Org', color: '#10b981', light: '#d1fae5', db: 'global' },
      user: { label: 'Users & Access', color: '#3b82f6', light: '#dbeafe', db: 'config' },
      app: { label: 'Applications', color: '#8b5cf6', light: '#ede9fe', db: 'config' },
      workflow: { label: 'Workflow', color: '#f59e0b', light: '#fef3c7', db: 'config' },
      forms: { label: 'Forms & Fields', color: '#06b6d4', light: '#cffafe', db: 'config' },
      map: { label: 'Maps & GIS', color: '#84cc16', light: '#ecfccb', db: 'config' },
      workitem: { label: 'Work Items', color: '#ef4444', light: '#fee2e2', db: 'work' },
      cityworks: { label: 'Cityworks', color: '#f97316', light: '#ffedd5', db: 'config/work' },
      positioning: { label: 'Positioning', color: '#6366f1', light: '#e0e7ff', db: 'tpsdk' },
      telog: { label: 'Telog Sensors', color: '#ec4899', light: '#fce7f3', db: 'work' },
    };

    // ═══════════════════════════════════════════════════════════
    // NODES (id, area, x, y = top-left corner, cols, desc)
    // ═══════════════════════════════════════════════════════════
    // col format: [name, type, flag]  flag: 'PK' | 'FK' | 'PK+FK' | ''
    const N = (id, area, x, y, desc, cols) => ({ id, area, x, y, desc, cols });
    const nodes = [

      // ── AUTH & ORG (top-left) ──────────────────────────────
      N('Organisation', 'auth', 30, 80,
        'Organisation registered on this device (multi-tenant)',
        [['description', 'TEXT', 'PK'], ['url', 'TEXT', 'PK'], ['_id', 'INT', ''], ['tenant', 'TEXT', ''], ['sso', 'INT', ''], ['backend', 'TEXT', ''], ['organisationId', 'TEXT', ''], ['gisUrl', 'TEXT', '']]),

      N('Organisation_SSOConfig', 'auth', 280, 80,
        'OAuth2/OIDC single-sign-on config per organisation',
        [['organisation_desc', 'TEXT', 'PK+FK'], ['idp_id', 'INT', 'PK'], ['provider_name', 'TEXT', ''], ['client_id', 'TEXT', ''], ['oauth2AuthorizeUrl', 'TEXT', ''], ['oauth2TokenUrl', 'TEXT', ''], ['scope', 'TEXT', '']]),

      N('Device_Users', 'auth', 30, 340,
        'Users who have previously logged in on this device',
        [['organisation_name', 'TEXT', 'PK'], ['user_name', 'TEXT', 'PK'], ['last_logged_in', 'INT', ''], ['sso_provider_name', 'TEXT', '']]),

      N('GlobalPreference', 'auth', 280, 340,
        'Key-value settings stored globally on device',
        [['key', 'TEXT', 'PK'], ['value', 'TEXT', '']]),

      // ── USERS & ACCESS (top-center) ────────────────────────
      N('UserAccount', 'user', 560, 80,
        'Authenticated user — stores credentials, roles and session info',
        [['_id', 'TEXT', 'PK'], ['username', 'TEXT', ''], ['displayname', 'TEXT', ''], ['active', 'BOOL', ''], ['is_supervisor', 'BOOL', ''], ['is_technician', 'BOOL', ''], ['is_rtu_manager', 'BOOL', ''], ['mfaRequired', 'BOOL', ''], ['sessionTimeout', 'INT', '']]),

      N('UserGroup', 'user', 820, 80,
        'Permission group; users can be members of multiple groups',
        [['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['active', 'INT', ''], ['parent_usergroup_id', 'TEXT', 'FK']]),

      N('OrganisationalUnit', 'user', 560, 350,
        'Department or team within the organisation',
        [['id', 'TEXT', 'PK'], ['shortCode', 'TEXT', ''], ['description', 'TEXT', ''], ['active', 'INT', ''], ['version', 'INT', '']]),

      N('IdentityProvider', 'user', 820, 350,
        'External identity provider (OAuth server)',
        [['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['serverurl', 'TEXT', ''], ['active', 'INT', ''], ['webmaps', 'INT', '']]),

      // ── APPLICATIONS (top-right) ───────────────────────────
      N('Application', 'app', 1100, 80,
        'App module shown to the user (e.g. Work Orders, Inspections)',
        [['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['shortCode', 'TEXT', ''], ['enabled', 'INT', ''], ['visible', 'BOOL', ''], ['parentAppId', 'TEXT', 'FK'], ['formDefinitionId', 'TEXT', 'FK'], ['sync_status', 'TEXT', ''], ['lastOpened', 'TEXT', '']]),

      N('LicensedFeature', 'app', 1360, 80,
        'Feature flag controlled by server-side licensing',
        [['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['enabled', 'INT', ''], ['active', 'INT', ''], ['externalId', 'TEXT', '']]),

      // ── WORKFLOW ENGINE (middle band) ──────────────────────
      N('DomainItemClassification', 'workflow', 30, 620,
        'Top-level category of items — e.g. "Work Order", "Inspection"',
        [['id', 'TEXT', 'PK'], ['alias', 'TEXT', ''], ['shortCode', 'TEXT', ''], ['formDefinition', 'TEXT', 'FK'], ['manualCreationAllowed', 'BOOL', ''], ['quickActionConfig', 'TEXT', '']]),

      N('DomainItemType', 'workflow', 300, 620,
        'Specific item sub-type — e.g. "Pothole Repair" under Work Order',
        [['_id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['domain_item_classification_id', 'TEXT', 'FK'], ['initialstatus_id', 'TEXT', 'FK'], ['application_id', 'TEXT', 'FK'], ['formdefinition', 'TEXT', 'FK'], ['internal_name', 'TEXT', ''], ['can_create_new', 'BOOL', '']]),

      N('DomainItemStatus', 'workflow', 570, 620,
        'Workflow status — e.g. New, In Progress, Closed, Cancelled',
        [['_id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['enableRequiredValidation', 'BOOL', '']]),

      N('Action', 'workflow', 840, 620,
        'Button a user can press — changes item status or triggers a script',
        [['_id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['tostatus_id', 'TEXT', 'FK'], ['actiontype', 'TEXT', ''], ['sortorder', 'INT', ''], ['requiresInternet', 'BOOL', ''], ['requiresSignature', 'BOOL', ''], ['skipValidation', 'BOOL', ''], ['canApplyOnCreate', 'BOOL', '']]),

      // ── FORMS & FIELDS (left band) ─────────────────────────
      N('FormDefinition', 'forms', 30, 920,
        'Screen/form layout — which fields appear and how they\'re arranged',
        [['_id', 'TEXT', 'PK'], ['name', 'TEXT', ''], ['description', 'TEXT', ''], ['form_type', 'TEXT', ''], ['maplayer_id', 'TEXT', 'FK'], ['geometryType', 'INT', ''], ['scoring_enabled', 'INT', ''], ['attachment_config', 'TEXT', '']]),

      N('AttributeDefinition', 'forms', 300, 920,
        'A single field on a form (text box, dropdown, date picker, etc.)',
        [['id', 'TEXT', 'PK'], ['formdefinition', 'TEXT', 'PK+FK'], ['aliasName', 'TEXT', ''], ['columnName', 'TEXT', ''], ['type', 'TEXT', ''], ['mandatory', 'BOOL', ''], ['editable', 'BOOL', ''], ['sortOrder', 'INT', ''], ['referenceDataTable', 'TEXT', 'FK'], ['config', 'TEXT', '']]),

      N('AttributeDisplayGroup', 'forms', 30, 1190,
        'Tab or page group that organises fields within a form',
        [['_id', 'TEXT', 'PK'], ['formdefinition', 'TEXT', 'PK+FK'], ['description', 'TEXT', ''], ['sortorder', 'INT', ''], ['displayAsTab', 'BOOL', '']]),

      N('DomainValue', 'forms', 300, 1190,
        'A picklist/dropdown option for a field (the allowed values)',
        [['domainname', 'TEXT', 'PK'], ['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['score', 'REAL', ''], ['active', 'INT', ''], ['sort_order', 'INT', '']]),

      N('Relationship', 'forms', 30, 1430,
        'Cascading field rule — selecting a parent value filters child options',
        [['_id', 'TEXT', 'PK'], ['parent_attributedefinition_id', 'TEXT', 'FK'], ['parentvalue', 'TEXT', ''], ['child_attributedefinition_id', 'TEXT', 'FK'], ['childvalue', 'TEXT', ''], ['defaultvalue', 'TEXT', '']]),

      N('Script', 'forms', 300, 1430,
        'JavaScript business logic attached to form events (save, load, change)',
        [['id', 'TEXT', 'PK'], ['content', 'TEXT', ''], ['language', 'TEXT', ''], ['scriptChain', 'TEXT', ''], ['active', 'INT', ''], ['sortOrder', 'INT', '']]),

      // ── MAPS & GIS (right band) ────────────────────────────
      N('MapService', 'map', 1140, 620,
        'ArcGIS map service connection (REST endpoint)',
        [['_id', 'TEXT', 'PK'], ['resturl', 'TEXT', ''], ['description', 'TEXT', ''], ['active', 'BOOL', ''], ['is_secured', 'INT', ''], ['is_idp_enabled', 'INT', '']]),

      N('MapLayer', 'map', 1400, 620,
        'Individual GIS layer within a map service (feature, tile, etc.)',
        [['_id', 'TEXT', 'PK'], ['mapservice', 'TEXT', 'FK'], ['gisLayerName', 'TEXT', ''], ['featuretype', 'TEXT', ''], ['entitytype', 'TEXT', ''], ['viewable', 'INT', ''], ['webmapid', 'TEXT', ''], ['hasSubtypes', 'BOOL', ''], ['layertype', 'TEXT', '']]),

      N('MapLayerSelection', 'map', 1660, 620,
        'Controls which layers are visible and searchable within an app',
        [['id', 'TEXT', 'PK'], ['application_id', 'TEXT', 'FK'], ['maplayer_id', 'TEXT', 'FK'], ['selected', 'INT', ''], ['searchable', 'INT', ''], ['recordertype', 'TEXT', ''], ['downloadinterval', 'INT', ''], ['opacity', 'REAL', '']]),

      N('OfflineMapArea', 'map', 1400, 900,
        'Offline tile package area the user can download for field use',
        [['_id', 'TEXT', 'PK'], ['displayName', 'TEXT', ''], ['webMapId', 'TEXT', ''], ['size', 'INT', ''], ['downloaded', 'BOOL', ''], ['portalItemId', 'TEXT', '']]),

      N('FeatureLayerDefinition', 'map', 1660, 900,
        'Metadata about an ArcGIS feature layer (geometry, subtypes, etc.)',
        [['featurelayerurl', 'TEXT', 'PK'], ['webmapid', 'TEXT', 'PK'], ['geometrytype', 'TEXT', ''], ['renderer', 'TEXT', ''], ['allowattachments', 'INT', ''], ['subtypes', 'TEXT', '']]),

      // ── WORK ITEMS — the runtime data (center-bottom) ──────
      N('DomainItem', 'workitem', 570, 920,
        '⭐ The core work item record — a work order, inspection, asset, etc.',
        [['internalid', 'INT', 'PK'], ['status', 'TEXT', 'PK'], ['domainitemtype_id', 'TEXT', 'FK'], ['domainitemstatus_id', 'TEXT', 'FK'], ['assignedtouser_id', 'TEXT', 'FK'], ['address_id', 'INT', 'FK'], ['server_id', 'TEXT', ''], ['is_new', 'BOOL', ''], ['values_json', 'JSON', ''], ['relateditemtype', 'TEXT', ''], ['sync_status', 'TEXT', ''], ['guid', 'TEXT', '']]),

      N('DomainItemRelationship', 'workitem', 570, 1270,
        'Parent ↔ child link between two domain items',
        [['parentDomainItem', 'INT', 'PK+FK'], ['childDomainItem', 'INT', 'PK+FK'], ['parentAttributeDefinition', 'TEXT', ''], ['linkType', 'INT', ''], ['status', 'TEXT', 'PK']]),

      N('Address', 'workitem', 840, 1270,
        'Physical address associated with a work item',
        [['id', 'INT', 'PK'], ['status', 'TEXT', 'PK'], ['address1', 'TEXT', ''], ['city', 'TEXT', ''], ['state', 'TEXT', ''], ['postcode', 'TEXT', ''], ['server_id', 'TEXT', '']]),

      N('Audit', 'workitem', 1110, 1270,
        'Immutable change history entry for a work item',
        [['internalId', 'INT', 'PK'], ['auditType', 'TEXT', ''], ['auditDate', 'INT', ''], ['referenceInternalId', 'INT', 'FK'], ['auditMessage', 'TEXT', ''], ['userAccount', 'TEXT', '']]),

      N('Attachment', 'workitem', 570, 1540,
        'Metadata record linking a file to a work item field',
        [['internalId', 'INT', 'PK'], ['fileGlobalId', 'TEXT', 'FK'], ['status', 'TEXT', 'PK'], ['relatedItemInternalId', 'INT', 'FK'], ['secondaryRelatedItemInternalId', 'INT', 'FK'], ['attributeDefinitionId', 'TEXT', 'FK'], ['active', 'INT', ''], ['description', 'TEXT', '']]),

      N('File', 'workitem', 840, 1540,
        'Actual file metadata — photo, PDF, signature, etc.',
        [['globalId', 'TEXT', 'PK'], ['name', 'TEXT', ''], ['filename', 'TEXT', ''], ['contentType', 'TEXT', ''], ['size', 'INT', ''], ['downloaded', 'INT', ''], ['uploaded', 'INT', ''], ['folderId', 'TEXT', 'FK'], ['applicationId', 'TEXT', 'FK'], ['lastModifiedDate', 'INT', '']]),

      N('Folder', 'workitem', 1110, 1540,
        'Document folder hierarchy for organising files per application',
        [['id', 'TEXT', 'PK'], ['applicationId', 'TEXT', 'FK'], ['name', 'TEXT', ''], ['parentFolderId', 'TEXT', 'FK'], ['canUpload', 'INT', '']]),

      // ── CITYWORKS INTEGRATION ──────────────────────────────
      N('CWModule', 'cityworks', 1400, 1270,
        'Cityworks module type (Work Order, Service Request, Inspection, Case)',
        [['cwModule', 'TEXT', 'PK'], ['cwModuleName', 'TEXT', 'PK']]),

      N('CWEntity', 'cityworks', 1660, 1270,
        'Cityworks entity type (asset type that links to a GIS layer)',
        [['code', 'TEXT', 'PK'], ['module', 'TEXT', 'PK+FK'], ['description', 'TEXT', ''], ['entityUidField', 'TEXT', ''], ['mapLayerName', 'TEXT', '']]),

      N('CWInspectionTemplate', 'cityworks', 1400, 1500,
        'Inspection template with QA model, linked to a domain item type',
        [['inspTemplateId', 'INT', 'PK'], ['domainItemTypeId', 'TEXT', 'FK'], ['inspTemplateName', 'TEXT', ''], ['isActive', 'INT', ''], ['qaModel', 'INT', ''], ['priority', 'TEXT', '']]),

      N('CWServiceRequestTemplate', 'cityworks', 1660, 1500,
        'Service request template linked to a domain item type',
        [['problemSid', 'INT', 'PK'], ['domainItemTypeId', 'TEXT', 'FK'], ['problemCode', 'TEXT', ''], ['priority', 'TEXT', ''], ['applyToEntity', 'TEXT', 'FK']]),

      N('CWSavedQueries', 'cityworks', 1400, 1730,
        'Saved Cityworks search query the user can run',
        [['createdBySid', 'INT', 'PK'], ['id', 'INT', 'PK'], ['name', 'TEXT', ''], ['queryType', 'TEXT', ''], ['isDownloaded', 'INT', ''], ['query', 'TEXT', '']]),

      // ── POSITIONING / GNSS ────────────────────────────────
      N('NtripServer', 'positioning', 30, 1720,
        'NTRIP caster server that streams GNSS correction data',
        [['id', 'TEXT', 'PK'], ['url', 'TEXT', ''], ['port', 'INT', ''], ['userName', 'TEXT', ''], ['correctionDatum', 'TEXT', ''], ['active', 'INT', '']]),

      N('NtripSource', 'positioning', 280, 1720,
        'Mount point / stream source on an NTRIP server',
        [['id', 'TEXT', 'PK'], ['ntripServer', 'TEXT', 'FK'], ['source', 'TEXT', ''], ['description', 'TEXT', ''], ['active', 'INT', '']]),

      N('Device', 'positioning', 30, 1960,
        'Paired GNSS hardware device (Bluetooth/USB)',
        [['address', 'TEXT', 'PK'], ['name', 'TEXT', ''], ['lastConnected', 'INT', '']]),

      N('PositioningConfig', 'positioning', 280, 1960,
        'Named positioning profile (accuracy settings, correction source)',
        [['id', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['connectionType', 'INT', ''], ['primaryType', 'TEXT', ''], ['ntripServer', 'TEXT', 'FK'], ['ntripSource', 'TEXT', 'FK'], ['antennaHeight', 'REAL', ''], ['active', 'INT', '']]),

      // ── TELOG SENSORS ─────────────────────────────────────
      N('TelogSiteType', 'telog', 580, 1720,
        'Classification of a Telog monitoring site (water, gas, etc.)',
        [['name', 'TEXT', 'PK'], ['description', 'TEXT', ''], ['isCore', 'INT', ''], ['isDefault', 'INT', '']]),

      N('TelogMeasurementType', 'telog', 830, 1720,
        'Category of sensor measurement (pressure, flow, level…)',
        [['id', 'INT', 'PK'], ['classId', 'INT', ''], ['isHidden', 'INT', '']]),

      N('TelogMeasurementUnit', 'telog', 1080, 1720,
        'Unit of measurement (m³/h, bar, mm, etc.)',
        [['id', 'INT', 'PK'], ['shortName', 'TEXT', ''], ['longName', 'TEXT', ''], ['conversion', 'REAL', ''], ['isDefault', 'INT', '']]),

      N('TelogMeasurement', 'telog', 580, 1960,
        'A sensor measurement registered on a monitoring site',
        [['id', 'INT', 'PK'], ['name', 'TEXT', ''], ['siteId', 'INT', ''], ['typeId', 'INT', 'FK'], ['unitId', 'INT', 'FK'], ['isHidden', 'INT', ''], ['isVirtual', 'INT', '']]),

      N('TelogSensorChannel', 'telog', 830, 1960,
        'Physical sensor channel configuration (slope, offset, enabled)',
        [['recId', 'TEXT', 'PK'], ['channelIndex', 'INT', 'PK'], ['channelName', 'TEXT', ''], ['measurementId', 'INT', 'FK'], ['enabled', 'INT', ''], ['chnlType', 'INT', ''], ['displaySlope', 'REAL', ''], ['displayOffset', 'REAL', '']]),
    ];

    // ═══════════════════════════════════════════════════════════
    // LINKS (relationships between tables)
    // Each link: { from, to, fromSide, toSide, label, via }
    // 'via' = brief plain-English explanation of the column join
    // ═══════════════════════════════════════════════════════════
    const links = [
      // AUTH & ORG
      {
        from: 'Organisation', to: 'Organisation_SSOConfig', fromSide: 'right', toSide: 'left',
        label: 'has SSO config', via: 'description → organisation_desc'
      },
      {
        from: 'Organisation', to: 'Device_Users', fromSide: 'bottom', toSide: 'top',
        label: 'device tracks users', via: '(implicit: organisation_name)'
      },

      // USERS
      {
        from: 'UserAccount', to: 'OrganisationalUnit', fromSide: 'bottom', toSide: 'top',
        label: 'belongs to dept', via: 'via UserAccount_OrganisationalUnit'
      },
      {
        from: 'UserAccount', to: 'UserGroup', fromSide: 'right', toSide: 'left',
        label: 'member of group', via: 'via UserAccount_UserGroup'
      },
      {
        from: 'UserGroup', to: 'UserGroup', fromSide: 'bottom', toSide: 'right',
        label: 'child of group', via: 'parent_usergroup_id → id'
      },

      // USERS → APPLICATIONS
      {
        from: 'UserAccount', to: 'Application', fromSide: 'right', toSide: 'left',
        label: 'has access to', via: 'via UserAccount_Application'
      },

      // APPLICATIONS
      {
        from: 'Application', to: 'Application', fromSide: 'top', toSide: 'right',
        label: 'sub-app of', via: 'parentAppId → id'
      },
      {
        from: 'Application', to: 'LicensedFeature', fromSide: 'right', toSide: 'left',
        label: 'licensed for', via: 'via UserAccount_LicensedFeature'
      },

      // APPLICATION → WORKFLOW
      {
        from: 'Application', to: 'DomainItemType', fromSide: 'bottom', toSide: 'top',
        label: 'shows item types', via: 'via Application_DomainItemType'
      },

      // WORKFLOW CORE
      {
        from: 'DomainItemClassification', to: 'DomainItemType', fromSide: 'right', toSide: 'left',
        label: 'groups types', via: 'id → domain_item_classification_id'
      },
      {
        from: 'DomainItemType', to: 'DomainItemStatus', fromSide: 'right', toSide: 'left',
        label: 'starts at status', via: 'initialstatus_id → _id'
      },
      {
        from: 'DomainItemType', to: 'Action', fromSide: 'right', toSide: 'left',
        label: 'allowed actions', via: 'via DomainItemType_Action'
      },
      {
        from: 'DomainItemStatus', to: 'Action', fromSide: 'right', toSide: 'left',
        label: 'action available\nfrom this status', via: 'DomainItemType_Action.fromstatus_id'
      },
      {
        from: 'Action', to: 'DomainItemStatus', fromSide: 'bottom', toSide: 'bottom',
        label: 'transitions to\nnew status', via: 'tostatus_id → _id'
      },

      // WORKFLOW → FORMS
      {
        from: 'DomainItemClassification', to: 'FormDefinition', fromSide: 'bottom', toSide: 'top',
        label: 'default form', via: 'formDefinition → _id'
      },
      {
        from: 'DomainItemType', to: 'FormDefinition', fromSide: 'bottom', toSide: 'top',
        label: 'custom form\nfor this type', via: 'formdefinition → _id'
      },

      // FORMS → FIELDS
      {
        from: 'FormDefinition', to: 'AttributeDefinition', fromSide: 'right', toSide: 'left',
        label: 'contains fields', via: '_id → formdefinition'
      },
      {
        from: 'FormDefinition', to: 'AttributeDisplayGroup', fromSide: 'bottom', toSide: 'top',
        label: 'tab/page groups', via: '_id → formdefinition'
      },
      {
        from: 'AttributeDefinition', to: 'DomainValue', fromSide: 'bottom', toSide: 'top',
        label: 'picklist values', via: 'referenceDataTable → domainname'
      },
      {
        from: 'AttributeDefinition', to: 'Relationship', fromSide: 'bottom', toSide: 'top',
        label: 'cascades child\nfield values', via: 'id → parent_attributedefinition_id'
      },
      {
        from: 'AttributeDefinition', to: 'Script', fromSide: 'bottom', toSide: 'top',
        label: 'field-level script', via: 'script → id'
      },

      // FORMS → MAPS
      {
        from: 'FormDefinition', to: 'MapLayer', fromSide: 'right', toSide: 'left',
        label: 'edit features\non this layer', via: 'maplayer_id → _id'
      },

      // MAPS
      {
        from: 'MapLayer', to: 'MapService', fromSide: 'left', toSide: 'right',
        label: 'served by', via: 'mapservice → _id'
      },
      {
        from: 'MapLayerSelection', to: 'MapLayer', fromSide: 'left', toSide: 'right',
        label: 'shows this layer', via: 'maplayer_id → _id'
      },
      {
        from: 'MapLayerSelection', to: 'Application', fromSide: 'top', toSide: 'bottom',
        label: 'configured for\nthis app', via: 'application_id → id'
      },

      // APPLICATION → WORK ITEMS
      {
        from: 'Application', to: 'File', fromSide: 'bottom', toSide: 'top',
        label: 'owns files', via: 'id → applicationId'
      },

      // WORK ITEMS CORE
      {
        from: 'DomainItemType', to: 'DomainItem', fromSide: 'bottom', toSide: 'top',
        label: 'instances of\nthis type', via: '_id → domainitemtype_id'
      },
      {
        from: 'DomainItemStatus', to: 'DomainItem', fromSide: 'bottom', toSide: 'top',
        label: 'has this status', via: '_id → domainitemstatus_id'
      },
      {
        from: 'UserAccount', to: 'DomainItem', fromSide: 'bottom', toSide: 'top',
        label: 'assigned to', via: '_id → assignedtouser_id'
      },
      {
        from: 'DomainItem', to: 'Address', fromSide: 'bottom', toSide: 'top',
        label: 'located at', via: 'address_id → id'
      },
      {
        from: 'DomainItem', to: 'DomainItemRelationship', fromSide: 'bottom', toSide: 'top',
        label: 'parent or child\nof another item', via: 'internalid → parentDomainItem / childDomainItem'
      },
      {
        from: 'DomainItem', to: 'Audit', fromSide: 'right', toSide: 'left',
        label: 'audit trail', via: 'internalid → referenceInternalId'
      },

      // ATTACHMENTS
      {
        from: 'DomainItem', to: 'Attachment', fromSide: 'bottom', toSide: 'top',
        label: 'has attachments\n(photos, docs)', via: 'internalid → relatedItemInternalId'
      },
      {
        from: 'Attachment', to: 'File', fromSide: 'right', toSide: 'left',
        label: 'references\nthis file', via: 'fileGlobalId → globalId'
      },
      {
        from: 'File', to: 'Folder', fromSide: 'right', toSide: 'left',
        label: 'stored in', via: 'folderId → id'
      },
      {
        from: 'Folder', to: 'Folder', fromSide: 'top', toSide: 'right',
        label: 'subfolder of', via: 'parentFolderId → id'
      },

      // CITYWORKS
      {
        from: 'CWModule', to: 'CWEntity', fromSide: 'right', toSide: 'left',
        label: 'contains\nasset types', via: 'cwModule → module'
      },
      {
        from: 'CWEntity', to: 'MapLayer', fromSide: 'top', toSide: 'bottom',
        label: 'visible on\nGIS layer', via: 'mapLayerName via CWAssetAliases'
      },
      {
        from: 'CWInspectionTemplate', to: 'DomainItemType', fromSide: 'top', toSide: 'bottom',
        label: 'drives\nthis item type', via: 'domainItemTypeId → _id'
      },
      {
        from: 'CWServiceRequestTemplate', to: 'DomainItemType', fromSide: 'top', toSide: 'bottom',
        label: 'drives\nthis item type', via: 'domainItemTypeId → _id'
      },
      {
        from: 'CWServiceRequestTemplate', to: 'CWEntity', fromSide: 'right', toSide: 'bottom',
        label: 'applied to\nentity type', via: 'applyToEntity → code'
      },
      {
        from: 'DomainItem', to: 'CWModule', fromSide: 'right', toSide: 'left',
        label: 'Cityworks work\nitem record', via: 'relateditemtype (WO/SR/Inspection/Case)'
      },

      // POSITIONING
      {
        from: 'NtripSource', to: 'NtripServer', fromSide: 'left', toSide: 'bottom',
        label: 'stream from', via: 'ntripServer → id'
      },
      {
        from: 'PositioningConfig', to: 'NtripServer', fromSide: 'top', toSide: 'bottom',
        label: 'uses server', via: 'ntripServer → id'
      },
      {
        from: 'PositioningConfig', to: 'NtripSource', fromSide: 'left', toSide: 'bottom',
        label: 'uses source', via: 'ntripSource → id'
      },
      {
        from: 'Device', to: 'PositioningConfig', fromSide: 'right', toSide: 'left',
        label: 'configured\nwith profile', via: 'via PositioningConfigDevice'
      },

      // TELOG
      {
        from: 'TelogMeasurement', to: 'TelogMeasurementType', fromSide: 'right', toSide: 'left',
        label: 'measurement type', via: 'typeId → id'
      },
      {
        from: 'TelogMeasurement', to: 'TelogMeasurementUnit', fromSide: 'right', toSide: 'right',
        label: 'measured in', via: 'unitId → id'
      },
      {
        from: 'TelogSensorChannel', to: 'TelogMeasurement', fromSide: 'left', toSide: 'bottom',
        label: 'captures', via: 'measurementId → id'
      },
    ];

    // ═══════════════════════════════════════════════════════════
    // ZONE BACKGROUND RECTS (x, y, w, h, area)
    // ═══════════════════════════════════════════════════════════
    const zones = [
      { area: 'auth', x: 10, y: 50, w: 510, h: 440 },
      { area: 'user', x: 540, y: 50, w: 510, h: 440 },
      { area: 'app', x: 1080, y: 50, w: 520, h: 300 },
      { area: 'workflow', x: 10, y: 580, w: 880, h: 250 },
      { area: 'forms', x: 10, y: 880, w: 540, h: 720 },
      { area: 'map', x: 1120, y: 580, w: 820, h: 480 },
      { area: 'workitem', x: 550, y: 880, w: 820, h: 1000 },
      { area: 'cityworks', x: 1380, y: 1230, w: 520, h: 720 },
      { area: 'positioning', x: 10, y: 1680, w: 510, h: 440 },
      { area: 'telog', x: 560, y: 1680, w: 770, h: 440 },
    ];

    // ═══════════════════════════════════════════════════════════
    // CARD HEIGHT CALCULATION
    // ═══════════════════════════════════════════════════════════
    const CARD_W = 210;
    const CARD_HEAD_H = 65;
    const COL_ROW_H = 22;
    const MAX_COLS = 6;
    const FOOTER_H = 18;

    function cardHeight(node) {
      const visible = Math.min(node.cols.length, MAX_COLS);
      const hasMore = node.cols.length > MAX_COLS;
      return CARD_HEAD_H + visible * COL_ROW_H + (hasMore ? FOOTER_H : 0) + 6;
    }

    // Card center point
    function cardCenter(node) {
      return { x: node.x + CARD_W / 2, y: node.y + cardHeight(node) / 2 };
    }

    // Edge midpoint based on side
    function edgePoint(node, side) {
      const h = cardHeight(node);
      const x = node.x, y = node.y;
      if (side === 'left') return { x: x, y: y + h / 2 };
      if (side === 'right') return { x: x + CARD_W, y: y + h / 2 };
      if (side === 'top') return { x: x + CARD_W / 2, y: y };
      if (side === 'bottom') return { x: x + CARD_W / 2, y: y + h };
      return { x: x + CARD_W / 2, y: y + h / 2 };
    }

    // ═══════════════════════════════════════════════════════════
    // BUILD NODE MAP
    // ═══════════════════════════════════════════════════════════
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    // ═══════════════════════════════════════════════════════════
    // RENDER ZONES
    // ═══════════════════════════════════════════════════════════
    const svg = document.getElementById('arrows-svg');
    svg.setAttribute('width', '2600');
    svg.setAttribute('height', '2400');

    // Defs
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    svg.appendChild(defs);

    // Arrowhead markers per area color
    Object.entries(AREAS).forEach(([area, cfg]) => {
      const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      m.setAttribute('id', `arr-${area}`);
      m.setAttribute('markerWidth', '8'); m.setAttribute('markerHeight', '6');
      m.setAttribute('refX', '7'); m.setAttribute('refY', '3');
      m.setAttribute('orient', 'auto');
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      p.setAttribute('points', '0 0, 8 3, 0 6');
      p.setAttribute('fill', cfg.color);
      m.appendChild(p);
      defs.appendChild(m);
    });

    // Zone backgrounds
    zones.forEach(z => {
      const cfg = AREAS[z.area];
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', z.x); rect.setAttribute('y', z.y);
      rect.setAttribute('width', z.w); rect.setAttribute('height', z.h);
      rect.setAttribute('rx', '14'); rect.setAttribute('fill', cfg.light);
      rect.setAttribute('stroke', cfg.color);
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('opacity', '0.6');
      svg.appendChild(rect);

      // Zone label
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', z.x + 14); txt.setAttribute('y', z.y + 22);
      txt.setAttribute('font-size', '10'); txt.setAttribute('font-weight', '800');
      txt.setAttribute('fill', cfg.color); txt.setAttribute('letter-spacing', '0.5');
      txt.setAttribute('text-transform', 'uppercase');
      txt.textContent = cfg.label.toUpperCase();
      svg.appendChild(txt);
    });

    // ═══════════════════════════════════════════════════════════
    // RENDER CARDS
    // ═══════════════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');

    nodes.forEach(node => {
      const cfg = AREAS[node.area];
      const h = cardHeight(node);

      const div = document.createElement('div');
      div.className = 'tcard';
      div.id = `card-${node.id}`;
      div.dataset.id = node.id;
      div.dataset.area = node.area;
      div.style.left = node.x + 'px';
      div.style.top = node.y + 'px';

      // Header
      const head = document.createElement('div');
      head.className = 'card-head';
      head.style.background = cfg.color;

      const dbTag = document.createElement('div');
      dbTag.className = 'card-db-tag';
      dbTag.textContent = cfg.db + ' · ' + node.area;
      head.appendChild(dbTag);

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = node.id;
      head.appendChild(title);

      const desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = node.desc;
      head.appendChild(desc);

      div.appendChild(head);

      // Body
      const body = document.createElement('div');
      body.className = 'card-body';

      const visible = Math.min(node.cols.length, MAX_COLS);
      for (let i = 0; i < visible; i++) {
        const [name, type, flag] = node.cols[i];
        const row = document.createElement('div');
        row.className = 'col-row' + (flag.includes('PK') ? ' pk-row' : '');

        if (flag) {
          const badge = document.createElement('span');
          badge.className = 'badge ' + (flag === 'PK+FK' ? 'pkfk' : flag === 'PK' ? 'pk' : 'fk');
          badge.textContent = flag;
          row.appendChild(badge);
        }

        const nm = document.createElement('span');
        nm.className = 'col-name';
        nm.textContent = name;
        row.appendChild(nm);

        const tp = document.createElement('span');
        tp.className = 'col-type';
        tp.textContent = type;
        row.appendChild(tp);

        body.appendChild(row);
      }

      if (node.cols.length > MAX_COLS) {
        const more = document.createElement('div');
        more.className = 'more-cols';
        more.textContent = `+${node.cols.length - MAX_COLS} more columns`;
        body.appendChild(more);
      }

      div.appendChild(body);
      canvas.appendChild(div);

      // Click handler
      div.addEventListener('click', () => selectNode(node.id));
    });

    // ═══════════════════════════════════════════════════════════
    // RENDER ARROWS
    // ═══════════════════════════════════════════════════════════
    const arrowGroups = [];

    links.forEach((lnk, i) => {
      const src = nodeMap[lnk.from];
      const tgt = nodeMap[lnk.to];
      if (!src || !tgt) return;

      const cfg = AREAS[src.area];
      const p1 = edgePoint(src, lnk.fromSide);
      const p2 = edgePoint(tgt, lnk.toSide);

      // Bezier control points
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      let c1x, c1y, c2x, c2y;

      if (lnk.fromSide === 'right' && lnk.toSide === 'left') {
        const off = Math.max(60, Math.abs(dx) * 0.45);
        c1x = p1.x + off; c1y = p1.y;
        c2x = p2.x - off; c2y = p2.y;
      } else if (lnk.fromSide === 'left' && lnk.toSide === 'right') {
        const off = Math.max(60, Math.abs(dx) * 0.45);
        c1x = p1.x - off; c1y = p1.y;
        c2x = p2.x + off; c2y = p2.y;
      } else if (lnk.fromSide === 'bottom' && lnk.toSide === 'top') {
        const off = Math.max(50, Math.abs(dy) * 0.45);
        c1x = p1.x; c1y = p1.y + off;
        c2x = p2.x; c2y = p2.y - off;
      } else if (lnk.fromSide === 'top' && lnk.toSide === 'bottom') {
        const off = Math.max(50, Math.abs(dy) * 0.45);
        c1x = p1.x; c1y = p1.y - off;
        c2x = p2.x; c2y = p2.y + off;
      } else if (lnk.fromSide === 'bottom' && lnk.toSide === 'bottom') {
        // Loop going down
        const maxY = Math.max(p1.y, p2.y) + 60;
        c1x = p1.x; c1y = maxY;
        c2x = p2.x; c2y = maxY;
      } else if (lnk.fromSide === 'top' && lnk.toSide === 'right') {
        c1x = p1.x; c1y = p1.y - 60;
        c2x = p2.x + 60; c2y = p2.y;
      } else if (lnk.fromSide === 'bottom' && lnk.toSide === 'right') {
        c1x = p1.x; c1y = p1.y + 60;
        c2x = p2.x + 60; c2y = p2.y;
      } else if (lnk.fromSide === 'left' && lnk.toSide === 'bottom') {
        c1x = p1.x - 60; c1y = p1.y;
        c2x = p2.x; c2y = p2.y + 60;
      } else if (lnk.fromSide === 'right' && lnk.toSide === 'bottom') {
        c1x = p1.x + 60; c1y = p1.y;
        c2x = p2.x; c2y = p2.y + 60;
      } else if (lnk.fromSide === 'top' && lnk.toSide === 'left') {
        c1x = p1.x; c1y = p1.y - 60;
        c2x = p2.x - 60; c2y = p2.y;
      } else {
        const off = Math.max(50, Math.max(Math.abs(dx), Math.abs(dy)) * 0.4);
        c1x = p1.x + (dx > 0 ? off : -off);
        c1y = p1.y + (dy > 0 ? off : -off);
        c2x = p2.x - (dx > 0 ? off : -off);
        c2y = p2.y - (dy > 0 ? off : -off);
      }

      // Self-reference (same node)
      if (lnk.from === lnk.to) {
        c1x = p1.x + 80; c1y = p1.y - 40;
        c2x = p2.x + 80; c2y = p2.y + 40;
      }

      const d = `M${p1.x},${p1.y} C${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;

      // Group
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.className.baseVal = 'arrow-wrap';
      g.dataset.from = lnk.from;
      g.dataset.to = lnk.to;

      // Path
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', 'arrow-path');
      path.setAttribute('stroke', cfg.color);
      path.setAttribute('marker-end', `url(#arr-${src.area})`);
      g.appendChild(path);

      // Label at midpoint of bezier
      const mt = 0.5;
      const mx = (1 - mt) ** 3 * p1.x + 3 * (1 - mt) ** 2 * mt * c1x + 3 * (1 - mt) * mt ** 2 * c2x + mt ** 3 * p2.x;
      const my = (1 - mt) ** 3 * p1.y + 3 * (1 - mt) ** 2 * mt * c1y + 3 * (1 - mt) * mt ** 2 * c2y + mt ** 3 * p2.y;

      const labelLines = lnk.label.split('\n');
      const labelG = document.createElementNS('http://www.w3.org/2000/svg', 'g');

      // Label background
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('rx', '4');
      bg.setAttribute('fill', 'white');
      bg.setAttribute('opacity', '0.85');
      labelG.appendChild(bg);

      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('class', 'arrow-label');
      txt.setAttribute('text-anchor', 'middle');

      labelLines.forEach((line, li) => {
        const ts = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        ts.setAttribute('x', mx);
        ts.setAttribute('dy', li === 0 ? '0' : '12');
        ts.textContent = line;
        txt.appendChild(ts);
      });

      const lineH = 12;
      const approxW = Math.max(...labelLines.map(l => l.length)) * 5.5 + 8;
      const approxH = labelLines.length * lineH + 4;
      txt.setAttribute('x', mx);
      txt.setAttribute('y', my - (labelLines.length > 1 ? (labelLines.length - 1) * 6 : 0));

      bg.setAttribute('x', mx - approxW / 2);
      bg.setAttribute('y', my - (labelLines.length > 1 ? (labelLines.length - 1) * 6 : 0) - 9);
      bg.setAttribute('width', approxW);
      bg.setAttribute('height', approxH);

      labelG.appendChild(txt);
      g.appendChild(labelG);

      svg.appendChild(g);

      arrowGroups.push({ g, from: lnk.from, to: lnk.to, via: lnk.via, label: lnk.label });
    });

    // ═══════════════════════════════════════════════════════════
    // PAN / ZOOM
    // ═══════════════════════════════════════════════════════════
    const outer = document.getElementById('canvas-outer');
    let scale = 0.5, tx = 40, ty = 20;
    let dragging = false, lastX, lastY;

    function applyTransform() {
      canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    }
    applyTransform();

    outer.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = outer.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const delta = e.deltaY < 0 ? 1.12 : 0.89;
      const newScale = Math.min(2, Math.max(0.15, scale * delta));
      tx = cx - (cx - tx) * newScale / scale;
      ty = cy - (cy - ty) * newScale / scale;
      scale = newScale;
      applyTransform();
    }, { passive: false });

    outer.addEventListener('mousedown', e => {
      if (e.target.closest('.tcard')) return;
      dragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx += e.clientX - lastX; ty += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform();
    });
    window.addEventListener('mouseup', () => dragging = false);

    // Touch
    outer.addEventListener('touchstart', e => {
      if (e.touches.length === 1) { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; dragging = true; }
    }, { passive: true });
    outer.addEventListener('touchmove', e => {
      if (dragging && e.touches.length === 1) {
        tx += e.touches[0].clientX - lastX; ty += e.touches[0].clientY - lastY;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        applyTransform();
      }
    }, { passive: true });
    outer.addEventListener('touchend', () => dragging = false);

    // ═══════════════════════════════════════════════════════════
    // SELECTION & HIGHLIGHT
    // ═══════════════════════════════════════════════════════════
    let selectedId = null;

    function selectNode(id) {
      if (selectedId === id) { clearSelection(); return; }
      selectedId = id;

      // Find connected nodes
      const connected = new Set([id]);
      arrowGroups.forEach(ag => {
        if (ag.from === id || ag.to === id) {
          connected.add(ag.from);
          connected.add(ag.to);
        }
      });

      // Apply classes to cards
      document.querySelectorAll('.tcard').forEach(el => {
        const eid = el.dataset.id;
        el.classList.toggle('selected', eid === id);
        el.classList.toggle('highlighted', connected.has(eid) && eid !== id);
        el.classList.toggle('faded', !connected.has(eid));
        el.style.boxShadow = eid === id
          ? `0 0 0 3px ${AREAS[nodeMap[eid].area].color}, 0 6px 24px rgba(0,0,0,0.2)`
          : connected.has(eid)
            ? `0 0 0 2px ${AREAS[nodeMap[eid].area].color}88, 0 4px 16px rgba(0,0,0,0.12)`
            : '';
      });

      // Apply classes to arrows
      arrowGroups.forEach(ag => {
        const isConnected = ag.from === id || ag.to === id;
        ag.g.classList.toggle('highlighted', isConnected);
        ag.g.classList.toggle('faded', !isConnected);
      });

      // Show info panel
      showInfoPanel(id, connected);
    }

    function clearSelection() {
      selectedId = null;
      document.querySelectorAll('.tcard').forEach(el => {
        el.classList.remove('selected', 'highlighted', 'faded');
        el.style.boxShadow = '';
      });
      arrowGroups.forEach(ag => ag.g.classList.remove('highlighted', 'faded'));
      document.getElementById('info-panel').classList.remove('open');
    }

    function showInfoPanel(id, connected) {
      const node = nodeMap[id];
      const cfg = AREAS[node.area];

      document.getElementById('ip-name').textContent = id;
      document.getElementById('ip-name').style.color = cfg.color;
      document.getElementById('ip-db').textContent = cfg.db + ' database  ·  ' + cfg.label;
      document.getElementById('ip-desc').textContent = node.desc;

      // Columns
      const colsDiv = document.getElementById('ip-cols');
      colsDiv.innerHTML = '';
      node.cols.forEach(([name, type, flag]) => {
        const row = document.createElement('div');
        row.className = 'ip-col';
        if (flag) {
          const b = document.createElement('span');
          b.className = 'badge ' + (flag === 'PK+FK' ? 'pkfk' : flag === 'PK' ? 'pk' : 'fk');
          b.textContent = flag;
          row.appendChild(b);
        }
        const nm = document.createElement('span'); nm.className = 'ip-col-name'; nm.textContent = name;
        const tp = document.createElement('span'); tp.className = 'ip-col-type'; tp.textContent = type;
        row.appendChild(nm); row.appendChild(tp);
        colsDiv.appendChild(row);
      });

      // Relationships
      const relsDiv = document.getElementById('ip-rels');
      relsDiv.innerHTML = '';
      arrowGroups.forEach(ag => {
        if (ag.from !== id && ag.to !== id) return;
        const isOut = ag.from === id;
        const otherTable = isOut ? ag.to : ag.from;
        const otherCfg = AREAS[nodeMap[otherTable].area];
        const rel = document.createElement('div');
        rel.className = 'ip-rel';
        rel.style.borderLeft = `3px solid ${otherCfg.color}`;
        rel.style.paddingLeft = '10px';
        rel.style.marginLeft = '6px';
        rel.innerHTML = `
      <div class="ip-rel-dir" style="color:${otherCfg.color}">${isOut ? '→ outgoing' : '← incoming'}</div>
      <div class="ip-rel-table" style="color:${otherCfg.color}">${otherTable}</div>
      <div style="color:#374151;font-size:11.5px">${ag.label.replace('\n', ' ')}</div>
      <div class="ip-rel-via">${ag.via}</div>
    `;
        rel.style.cursor = 'pointer';
        rel.addEventListener('click', () => selectNode(otherTable));
        relsDiv.appendChild(rel);
      });

      document.getElementById('info-panel').classList.add('open');
    }

    document.getElementById('close-panel').addEventListener('click', clearSelection);

    // Click on canvas to deselect
    outer.addEventListener('click', e => {
      if (!e.target.closest('.tcard') && !e.target.closest('#info-panel')) clearSelection();
    });

    // ═══════════════════════════════════════════════════════════
    // SEARCH
    // ═══════════════════════════════════════════════════════════
    document.getElementById('search').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim();
      if (!q) { clearSelection(); return; }
      const match = nodes.find(n => n.id.toLowerCase().startsWith(q) || n.desc.toLowerCase().includes(q));
      if (match) {
        selectNode(match.id);
        // Pan to node
        const h = cardHeight(match);
        const cx = outer.offsetWidth / 2;
        const cy = outer.offsetHeight / 2;
        tx = cx - (match.x + CARD_W / 2) * scale;
        ty = cy - (match.y + h / 2) * scale;
        applyTransform();
      }
    });

    // ═══════════════════════════════════════════════════════════
    // FILTER BY AREA
    // ═══════════════════════════════════════════════════════════
    let activeArea = 'all';

    document.querySelectorAll('.filter-btn').forEach(btn => {
      const c = AREAS[btn.dataset.area];
      if (c) {
        btn.style.background = c.color + '22';
        btn.style.color = c.color;
        btn.style.borderColor = c.color + '55';
      }
      if (btn.dataset.area === 'all') {
        btn.style.background = '#475569';
        btn.style.color = '#fff';
        btn.style.borderColor = '#475569';
      }

      btn.addEventListener('click', () => {
        activeArea = btn.dataset.area;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        clearSelection();
        applyAreaFilter();
      });
    });

    function applyAreaFilter() {
      document.querySelectorAll('.tcard').forEach(el => {
        const inArea = activeArea === 'all' || el.dataset.area === activeArea;
        el.style.opacity = inArea ? '1' : '0.08';
      });
      arrowGroups.forEach(ag => {
        const srcArea = nodeMap[ag.from]?.area;
        const tgtArea = nodeMap[ag.to]?.area;
        const visible = activeArea === 'all' || srcArea === activeArea || tgtArea === activeArea;
        ag.g.style.opacity = visible ? '1' : '0.04';
      });
      // Zone backgrounds
      document.querySelectorAll('.zone-bg rect').forEach(el => {
        el.style.opacity = activeArea === 'all' || el.dataset.area === activeArea ? '0.6' : '0.1';
      });
    }

    // ═══════════════════════════════════════════════════════════
    // RESET
    // ═══════════════════════════════════════════════════════════
    document.getElementById('btn-reset').addEventListener('click', () => {
      clearSelection();
      document.getElementById('search').value = '';
      activeArea = 'all';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn[data-area="all"]').classList.add('active');
      applyAreaFilter();
      scale = 0.5; tx = 40; ty = 20;
      applyTransform();
    });

    // ═══════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════════════════════
    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') clearSelection();
      if ((e.metaKey || e.ctrlKey) && e.key === '=') { scale = Math.min(2, scale * 1.15); applyTransform(); e.preventDefault(); }
      if ((e.metaKey || e.ctrlKey) && e.key === '-') { scale = Math.max(0.15, scale / 1.15); applyTransform(); e.preventDefault(); }
      if ((e.metaKey || e.ctrlKey) && e.key === '0') { scale = 0.5; tx = 40; ty = 20; applyTransform(); e.preventDefault(); }
    });

    // Hint on first load
    setTimeout(() => {
      const h = document.createElement('div');
      h.style.cssText = 'position:fixed;bottom:18px;right:18px;background:#1e293b;color:#94a3b8;padding:10px 14px;border-radius:10px;font-size:11.5px;z-index:300;line-height:1.7;pointer-events:none;transition:opacity 1s';
      h.innerHTML = '<b style="color:#e2e8f0">Click</b> a table to see connections<br><b style="color:#e2e8f0">Drag</b> to pan · <b style="color:#e2e8f0">Scroll</b> to zoom<br><b style="color:#e2e8f0">Cmd+0</b> to reset view';
      document.body.appendChild(h);
      setTimeout(() => h.style.opacity = '0', 5000);
      setTimeout(() => h.remove(), 6000);
    }, 200);
  </script>
</div>
</body>
</html>
